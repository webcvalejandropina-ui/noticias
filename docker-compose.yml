services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-news-api:latest
    container_name: ai-news-api
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-13100}:13100"
    environment:
      - PORT=13100
      - DB_PATH=/app/data/news.db
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ai-news-data:/app/data
    networks:
      - ai-news-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-news-frontend:latest
    container_name: ai-news-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      - API_URL=http://api:13100
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:${HOST_PORT:-13100}}
      - TZ=${TZ:-Europe/Madrid}
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ai-news-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    image: ai-news-api:latest
    container_name: ai-news-scraper
    restart: "no"
    depends_on:
      - api
    environment:
      - DB_PATH=/app/data/news.db
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - ai-news-data:/app/data
    networks:
      - ai-news-net
    entrypoint: ["bun", "run", "src/cli/scrape.ts"]
    profiles:
      - scrape

networks:
  ai-news-net:
    driver: bridge

volumes:
  ai-news-data:
    driver: local
