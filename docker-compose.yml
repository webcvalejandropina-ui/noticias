# ==============================================================================
#  docker-compose.yml — DEV / LOCAL / LAN / Portainer (cualquier SO)
# ==============================================================================
# Este fichero NO contiene build: define solo las imágenes ya construidas. De
# ese modo vale igual para:
#   - tu máquina (se combina con docker-compose.override.yml, que sí trae build)
#   - otro PC de la LAN al que copias el .tar y haces `docker load`
#   - Portainer (Web editor): pégalo tal cual, sin contexto de build
#
# Variables de entorno aceptadas (en .env o en la UI de Portainer):
#   HOST_PORT, FRONTEND_PORT, TZ, PUBLIC_API_URL, SCRAPE_ON_START
#   PUBLIC_API_URL → en LAN debe ser http://IP_DEL_HOST:13100 (no "localhost").
#
# Scraper one-shot:  docker compose --profile scrape run --rm scraper
# ==============================================================================

services:
  api:
    image: ${NOTICIAS_API_IMAGE:-ai-news-api:latest}
    pull_policy: missing
    container_name: ai-news-api
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-13100}:13100"
    environment:
      - PORT=13100
      - DB_PATH=/app/data/news.db
      - TZ=${TZ:-Europe/Madrid}
      # APP_ENV controla CORS (production = lista estricta). Las rutas /refresh, /sync… exigen
      # ADMIN_API_TOKEN salvo ALLOW_OPEN_ADMIN_ROUTES=1 (solo local de confianza).
      - APP_ENV=${APP_ENV:-development}
      - ALLOW_OPEN_ADMIN_ROUTES=${ALLOW_OPEN_ADMIN_ROUTES:-}
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      # Sync en background al arrancar → stack listo con noticias sin intervención.
      - SCRAPE_ON_START=${SCRAPE_ON_START:-1}
      # Intervalo (min) del /sync automático. 0 = off. Por defecto 1h.
      - AUTO_SYNC_INTERVAL_MIN=${AUTO_SYNC_INTERVAL_MIN:-60}
      # Tope de noticias por fuente en cada scrape (filtradas ya por los
      # últimos MAX_AGE_DAYS días). Por defecto 50.
      - MAX_ITEMS_PER_SOURCE=${MAX_ITEMS_PER_SOURCE:-50}
    volumes:
      - ai-news-data:/app/data
    networks:
      - ai-news-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:13100/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${NOTICIAS_FRONTEND_IMAGE:-ai-news-frontend:latest}
    pull_policy: missing
    container_name: ai-news-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      - API_URL=http://api:13100
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:13100}
      - TZ=${TZ:-Europe/Madrid}
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      - api
    networks:
      - ai-news-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4321/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    image: ${NOTICIAS_API_IMAGE:-ai-news-api:latest}
    pull_policy: missing
    container_name: ai-news-scraper
    restart: "no"
    depends_on:
      - api
    environment:
      - DB_PATH=/app/data/news.db
      - TZ=${TZ:-Europe/Madrid}
      - MAX_ITEMS_PER_SOURCE=${MAX_ITEMS_PER_SOURCE:-50}
    volumes:
      - ai-news-data:/app/data
    networks:
      - ai-news-net
    entrypoint: ["bun", "src/cli/scrape.ts"]
    profiles:
      - scrape

networks:
  ai-news-net:
    driver: bridge

volumes:
  ai-news-data:
    driver: local
